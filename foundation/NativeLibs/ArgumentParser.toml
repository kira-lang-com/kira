[library]
name = "kira_argument_parser"
link_mode = "static"
abi = "c"

[headers]
entrypoint = "ArgumentParser/argument_parser.h"
include_dirs = ["ArgumentParser"]

[autobinding]
module = "argument_parser"
output = "../bindings/argument_parser/argument_parser.kira"
headers = ["ArgumentParser/argument_parser.h"]

[bindings]
mode = "all_public"

[build]
sources = ["ArgumentParser/argument_parser.c"]
include_dirs = ["ArgumentParser"]

[target.aarch64-macos-none]
static_lib = "../generated/native/aarch64-macos/libkira_argument_parser.a"

[target.x86_64-linux-gnu]
static_lib = "../generated/native/x86_64-linux-gnu/libkira_argument_parser.a"

[target.x86_64-windows-msvc]
static_lib = "../generated/native/x86_64-windows-msvc/kira_argument_parser.lib"
