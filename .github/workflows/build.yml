name: Build

on:
  push:
    branches: [ '**' ]  # Trigger on all branches (including main)
  pull_request:
    branches: [ '**' ]  # Trigger on PRs to all branches (including main)
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: kira
            name: kira-Linux-x86_64.tar.gz
            
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: kira
            name: kira-Darwin-aarch64.tar.gz
            
          # Windows builds are currently disabled because:
          # - Pre-built LLVM binaries for Windows don't include llvm-config.exe
          # - llvm-sys requires llvm-config to build
          # - Building LLVM from source takes 30+ minutes in CI
          # TODO: Re-enable once we find a solution (cached LLVM build, alternative approach, etc.)
          # - os_name: Windows-x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   bin: kira.exe
          #   name: kira-Windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y llvm-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: matrix.platform.os == 'macos-latest'
        run: |
          brew install llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: matrix.platform.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17.0"
          directory: C:\LLVM

      - name: Set LLVM environment variable (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "LLVM_SYS_170_PREFIX=$env:LLVM_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: toolchain/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Build binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package as archive (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          cd toolchain/target/${{ matrix.platform.target }}/release
          tar czvf ${{ matrix.platform.name }} toolchain
          mv ${{ matrix.platform.name }} $GITHUB_WORKSPACE/

      - name: Package as archive (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          cd toolchain/target/${{ matrix.platform.target }}/release
          Compress-Archive -Path toolchain.exe -DestinationPath ${{ matrix.platform.name }}
          Move-Item -Path ${{ matrix.platform.name }} -Destination $env:GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.os_name }}
          path: ${{ matrix.platform.name }}

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.platform.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
