name: CI

on:
  push:
  pull_request:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift
        run: |
          swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
      - name: LSP smoke
        run: |
          swift build -c debug --product kira-lsp
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}\n' | .build/debug/kira-lsp | head -n 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        run: |
          sudo apt-get update
          sudo apt-get install -y swift libffi-dev
      - name: Verify Swift
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: "5.9"
      - name: Build
        run: swift build -v
