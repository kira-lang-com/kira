name: Release LLVM Toolchains

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create or update the GitHub release after the build succeeds"
        required: false
        default: false
        type: boolean
      verify_checksums:
        description: "Fail the build if llvm-metadata.toml checksums are missing or stale"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "llvm-v*-kira.*"
  pull_request:
    paths:
      - ".github/workflows/release-llvm-toolchains.yml"
      - "docs/llvm_toolchain.md"
      - "llvm-metadata.toml"
      - "scripts/llvm/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate metadata
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.metadata.outputs.matrix }}
      llvm_version: ${{ steps.metadata.outputs.llvm_version }}
      llvm_source_tag: ${{ steps.metadata.outputs.llvm_source_tag }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      build_type: ${{ steps.metadata.outputs.build_type }}
      cmake_generator: ${{ steps.metadata.outputs.cmake_generator }}
      targets_to_build: ${{ steps.metadata.outputs.targets_to_build }}
      publish: ${{ steps.metadata.outputs.publish }}
      enforce_checksums: ${{ steps.metadata.outputs.enforce_checksums }}
    steps:
      - name: Check out Kira
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate llvm-metadata.toml
        if: ${{ github.event_name != 'push' }}
        run: python scripts/llvm/llvm_release.py validate --metadata llvm-metadata.toml

      - name: Validate release tag
        if: ${{ github.event_name == 'push' }}
        run: python scripts/llvm/llvm_release.py validate --metadata llvm-metadata.toml --ref-name "${{ github.ref_name }}"

      - name: Export workflow metadata
        id: metadata
        run: |
          python scripts/llvm/llvm_release.py github-outputs \
            --metadata llvm-metadata.toml \
            --output "$GITHUB_OUTPUT" \
            --event-name "${{ github.event_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --publish-input "${{ inputs.publish || 'false' }}" \
            --verify-input "${{ inputs.verify_checksums || 'false' }}"

  build:
    name: Build ${{ matrix.target_key }}
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
    steps:
      - name: Check out Kira
        uses: actions/checkout@v4

      - name: Check out llvm-project
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: ${{ needs.validate.outputs.llvm_source_tag }}
          path: llvm-project
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up MSVC
        if: ${{ matrix.platform == 'windows' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build LLVM install tree (Unix)
        if: ${{ matrix.platform != 'windows' }}
        shell: bash
        run: |
          bash scripts/llvm/build-llvm.sh \
            --source-dir "$GITHUB_WORKSPACE/llvm-project" \
            --build-dir "$RUNNER_TEMP/llvm-build" \
            --install-dir "$RUNNER_TEMP/llvm-install" \
            --target-key "${{ matrix.target_key }}" \
            --build-type "${{ needs.validate.outputs.build_type }}" \
            --cmake-generator "${{ needs.validate.outputs.cmake_generator }}" \
            --targets-to-build "${{ needs.validate.outputs.targets_to_build }}"

      - name: Build LLVM install tree (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          ./scripts/llvm/build-llvm.ps1 `
            -SourceDir "$env:GITHUB_WORKSPACE\llvm-project" `
            -BuildDir "$env:RUNNER_TEMP\llvm-build" `
            -InstallDir "$env:RUNNER_TEMP\llvm-install" `
            -TargetKey "${{ matrix.target_key }}" `
            -BuildType "${{ needs.validate.outputs.build_type }}" `
            -CmakeGenerator "${{ needs.validate.outputs.cmake_generator }}" `
            -TargetsToBuild "${{ needs.validate.outputs.targets_to_build }}"

      - name: Package LLVM install tree (Unix)
        if: ${{ matrix.platform != 'windows' }}
        shell: bash
        run: |
          archive_path="$(bash scripts/llvm/package-llvm.sh \
            --install-dir "$RUNNER_TEMP/llvm-install" \
            --output-dir "$RUNNER_TEMP/llvm-dist" \
            --asset-name "${{ matrix.asset }}" \
            --archive-format "${{ matrix.archive }}")"
          printf 'ARCHIVE_PATH=%s\n' "$archive_path" >> "$GITHUB_ENV"

      - name: Package LLVM install tree (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $archivePath = ./scripts/llvm/package-llvm.ps1 `
            -InstallDir "$env:RUNNER_TEMP\llvm-install" `
            -OutputDir "$env:RUNNER_TEMP\llvm-dist" `
            -AssetName "${{ matrix.asset }}" `
            -ArchiveFormat "${{ matrix.archive }}"
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append

      - name: Write checksum file (Unix)
        if: ${{ matrix.platform != 'windows' }}
        shell: bash
        run: |
          verify_flag=""
          if [[ "${{ needs.validate.outputs.enforce_checksums }}" == "true" ]]; then
            verify_flag="--verify"
          fi

          python scripts/llvm/llvm_release.py checksum \
            --metadata llvm-metadata.toml \
            --target "${{ matrix.target_key }}" \
            --artifact "$ARCHIVE_PATH" \
            --output "$ARCHIVE_PATH.sha256" \
            $verify_flag | tee "$RUNNER_TEMP/llvm-dist/${{ matrix.target_key }}.checksum.log"
          printf 'CHECKSUM_LOG_PATH=%s\n' "$RUNNER_TEMP/llvm-dist/${{ matrix.target_key }}.checksum.log" >> "$GITHUB_ENV"

      - name: Write checksum file (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $verifyArgs = @()
          if ("${{ needs.validate.outputs.enforce_checksums }}" -eq "true") {
            $verifyArgs += "--verify"
          }

          $logPath = Join-Path $env:RUNNER_TEMP "llvm-dist\${{ matrix.target_key }}.checksum.log"
          $command = @(
            "scripts/llvm/llvm_release.py",
            "checksum",
            "--metadata", "llvm-metadata.toml",
            "--target", "${{ matrix.target_key }}",
            "--artifact", $env:ARCHIVE_PATH,
            "--output", "$env:ARCHIVE_PATH.sha256"
          ) + $verifyArgs

          & python @command 2>&1 | Tee-Object -FilePath $logPath
          if ($LASTEXITCODE -ne 0) {
            throw "Checksum generation failed."
          }
          "CHECKSUM_LOG_PATH=$logPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-bundle-${{ matrix.target_key }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256
            ${{ env.CHECKSUM_LOG_PATH }}
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs:
      - validate
      - build
    if: ${{ needs.validate.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out Kira
        uses: actions/checkout@v4

      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          pattern: llvm-bundle-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          LLVM_VERSION: ${{ needs.validate.outputs.llvm_version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          cat > release-notes.txt <<EOF
          Pinned LLVM ${LLVM_VERSION} toolchain bundles for Kira contributors.

          Source of truth: llvm-metadata.toml in the tagged Kira commit.
          Each archive name matches the metadata exactly, and each archive has a sibling .sha256 asset.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.txt
          else
            gh release create "$RELEASE_TAG" --target "$RELEASE_TARGET" --title "$RELEASE_TAG" --notes-file release-notes.txt
          fi

          gh release upload "$RELEASE_TAG" dist/* --clobber
