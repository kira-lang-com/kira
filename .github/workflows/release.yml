name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: "0.1.0"
  BINARY_NAME: "kira"
  PRIMARY_EXECUTABLE: "kirac"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Keep aligned with test.yml and llvm-metadata.toml.
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
            artifact_suffix: linux-x64
            archive_ext: tar.gz
          - os: macos
            arch: arm64
            runner: macos-14
            artifact_suffix: macos-arm64
            archive_ext: tar.gz
          - os: windows
            arch: x64
            runner: windows-2022
            artifact_suffix: windows-x64
            archive_ext: zip

    steps:
      - name: Check out Kira
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install native graphics headers (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxi-dev libxcursor-dev

      - name: Build Kira (Unix)
        if: matrix.os != 'windows'
        run: zig build -Doptimize=ReleaseSafe

      - name: Build Kira (Windows)
        if: matrix.os == 'windows'
        run: zig build -Doptimize=ReleaseSafe
        shell: pwsh

      - name: Package release (Unix)
        id: package
        if: matrix.os != 'windows'
        shell: bash
        run: |
          STAGE_DIR="${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}"
          mkdir -p "$STAGE_DIR"

          cp zig-out/bin/kirac "$STAGE_DIR/${{ env.PRIMARY_EXECUTABLE }}"
          cp zig-out/bin/kira-bootstrapper "$STAGE_DIR/${{ env.BINARY_NAME }}"
          chmod +x "$STAGE_DIR/${{ env.PRIMARY_EXECUTABLE }}"
          chmod +x "$STAGE_DIR/${{ env.BINARY_NAME }}"

          cp README.md LICENSE "$STAGE_DIR/"

          mkdir -p "$STAGE_DIR/templates"
          cp -r templates/* "$STAGE_DIR/templates/"
          mkdir -p "$STAGE_DIR/foundation"
          cp -r foundation/* "$STAGE_DIR/foundation/"
          cp llvm-metadata.toml "$STAGE_DIR/"

          ARCHIVE="${STAGE_DIR}.${{ matrix.archive_ext }}"
          tar -czf "$ARCHIVE" "$STAGE_DIR"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Package release (Windows)
        id: package-win
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $stageDir = "${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item "zig-out\bin\kirac.exe" -Destination "$stageDir\${{ env.PRIMARY_EXECUTABLE }}.exe"
          Copy-Item "zig-out\bin\kira-bootstrapper.exe" -Destination "$stageDir\${{ env.BINARY_NAME }}.exe"

          Copy-Item README.md, LICENSE -Destination "$stageDir\"

          New-Item -ItemType Directory -Force -Path "$stageDir\templates" | Out-Null
          Copy-Item "templates\*" -Destination "$stageDir\templates\" -Recurse
          New-Item -ItemType Directory -Force -Path "$stageDir\foundation" | Out-Null
          Copy-Item "foundation\*" -Destination "$stageDir\foundation\" -Recurse
          Copy-Item llvm-metadata.toml -Destination "$stageDir\"

          $archive = "$stageDir.${{ matrix.archive_ext }}"
          Compress-Archive -Path $stageDir -DestinationPath $archive
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ matrix.os == 'windows' && steps.package-win.outputs.archive || steps.package.outputs.archive }}
          if-no-files-found: error

  checksum:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kira-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum -b * > SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, checksum]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kira-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 1
          fi

          cat > /tmp/notes.md << 'RELEASE_NOTES'
          Kira v0.1.0 release

          ## Installation
          Extract the archive for your platform and add the bin directory to your PATH.

          ## What's Included
          - `kirac` - Kira compiler CLI
          - `kira` - Bootstrapper launcher
          - templates/ - Project templates
          - foundation/ - Foundation library
          - llvm-metadata.toml - LLVM toolchain version

          ## Verification
          Verify the checksums using `sha256sum -c SHA256SUMS.txt`
          RELEASE_NOTES

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file /tmp/notes.md \
            artifacts/kira-* \
            artifacts/SHA256SUMS.txt

      - name: Verify release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected=(kira-linux-x64.tar.gz kira-macos-arm64.tar.gz kira-windows-x64.zip SHA256SUMS.txt)
          for asset in "${expected[@]}"; do
            if ! gh release view "$TAG_NAME" --json assets --jq '.assets[].name' | grep -qx "$asset"; then
              echo "Missing expected asset: $asset"
              exit 1
            fi
          done
          echo "All expected assets present"