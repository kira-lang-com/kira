name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Kira ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

  build-release:
    name: Build Release - ${{ matrix.platform.os_name }}
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: kira
            name: kira-Linux-x86_64.tar.gz
            
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: kira
            name: kira-Darwin-aarch64.tar.gz
            
          # Windows builds are currently disabled because:
          # - Pre-built LLVM binaries for Windows don't include llvm-config.exe
          # - llvm-sys requires llvm-config to build
          # - Building LLVM from source takes 30+ minutes in CI
          # TODO: Re-enable once we find a solution (cached LLVM build, alternative approach, etc.)
          # - os_name: Windows-x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   bin: kira.exe
          #   name: kira-Windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y llvm-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: matrix.platform.os == 'macos-latest'
        run: |
          brew install llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: matrix.platform.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17.0"
          directory: C:\LLVM

      - name: Set LLVM environment variable (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "LLVM_SYS_170_PREFIX=$env:LLVM_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Build binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Strip binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: strip toolchain/target/${{ matrix.platform.target }}/release/toolchain

      - name: Rename binary
        shell: bash
        run: |
          cd toolchain/target/${{ matrix.platform.target }}/release
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            mv toolchain.exe kira.exe
          else
            mv toolchain kira
          fi

      - name: Package as archive (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          cd toolchain/target/${{ matrix.platform.target }}/release
          tar czvf ${{ matrix.platform.name }} kira
          mv ${{ matrix.platform.name }} $GITHUB_WORKSPACE/

      - name: Package as archive (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          cd toolchain/target/${{ matrix.platform.target }}/release
          Compress-Archive -Path kira.exe -DestinationPath ${{ matrix.platform.name }}
          Move-Item -Path ${{ matrix.platform.name }} -Destination $env:GITHUB_WORKSPACE

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.platform.name }}
          asset_name: ${{ matrix.platform.name }}
          asset_content_type: application/octet-stream

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            certutil -hashfile ${{ matrix.platform.name }} SHA256 > ${{ matrix.platform.name }}.sha256
          else
            shasum -a 256 ${{ matrix.platform.name }} > ${{ matrix.platform.name }}.sha256
          fi

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.platform.name }}.sha256
          asset_name: ${{ matrix.platform.name }}.sha256
          asset_content_type: text/plain
