name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.1.0 or v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.resolve_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          version="${tag#v}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=${tag}" >> $GITHUB_OUTPUT

      - name: Resolve Release
        id: resolve_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.get_version.outputs.tag }}"
          version="${{ steps.get_version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists for $tag"
          else
            gh release create "$tag" --title "Kira $version" --generate-notes
          fi
          upload_url=$(gh api repos/${{ github.repository }}/releases/tags/$tag -q .upload_url)
          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

  build-release:
    name: Build Release - ${{ matrix.platform.os_name }}
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: kira
            name: kira-Linux-x86_64.tar.gz
            
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: kira
            name: kira-Darwin-aarch64.tar.gz
            
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: kira.exe
            name: kira-Windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y llvm-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: matrix.platform.os == 'macos-latest'
        run: |
          brew install llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: matrix.platform.os == 'windows-latest'
        uses: actions/cache@v4
        id: cache-llvm-windows
        with:
          path: C:\LLVM-17
          key: llvm-17.0.6-windows-msvc-v1

      - name: Check LLVM cache
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "C:\LLVM-17\bin\llvm-config.exe") {
            Write-Host "✓ LLVM cache found and valid"
            & "C:\LLVM-17\bin\llvm-config.exe" --version
          } else {
            Write-Error "LLVM cache not found! Please run the 'Build LLVM for Windows' workflow first."
            Write-Error "Go to: https://github.com/${{ github.repository }}/actions/workflows/build-llvm-windows.yml"
            exit 1
          }

      - name: Set LLVM environment variable (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "LLVM_SYS_170_PREFIX=C:\LLVM-17" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\LLVM-17\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('toolchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('toolchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: toolchain/target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.platform.target }}-${{ hashFiles('toolchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-${{ matrix.platform.target }}-

      - name: Build binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --bin kira --target ${{ matrix.platform.target }}

      - name: Build binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        working-directory: toolchain
        run: cargo build --release --bin kira --target ${{ matrix.platform.target }}

      - name: Build runtime static library
        working-directory: toolchain
        run: cargo build --release --lib --no-default-features --target ${{ matrix.platform.target }}
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/toolchain/target/runtime

      - name: Strip binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: strip toolchain/target/${{ matrix.platform.target }}/release/kira

      - name: Package as archive (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp toolchain/target/${{ matrix.platform.target }}/release/kira dist/
          cp toolchain/target/runtime/${{ matrix.platform.target }}/release/libtoolchain.a dist/libkira_runtime.a
          tar czvf ${{ matrix.platform.name }} -C dist kira libkira_runtime.a
          mv ${{ matrix.platform.name }} $GITHUB_WORKSPACE/

      - name: Package as archive (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path toolchain/target/${{ matrix.platform.target }}/release/kira.exe -Destination dist/kira.exe
          Copy-Item -Path toolchain/target/runtime/${{ matrix.platform.target }}/release/toolchain.lib -Destination dist/kira_runtime.lib
          Compress-Archive -Path dist/kira.exe,dist/kira_runtime.lib -DestinationPath ${{ matrix.platform.name }}
          Move-Item -Path ${{ matrix.platform.name }} -Destination $env:GITHUB_WORKSPACE

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.platform.name }}
          asset_name: ${{ matrix.platform.name }}
          asset_content_type: application/octet-stream

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            certutil -hashfile ${{ matrix.platform.name }} SHA256 > ${{ matrix.platform.name }}.sha256
          else
            shasum -a 256 ${{ matrix.platform.name }} > ${{ matrix.platform.name }}.sha256
          fi

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.platform.name }}.sha256
          asset_name: ${{ matrix.platform.name }}.sha256
          asset_content_type: text/plain
